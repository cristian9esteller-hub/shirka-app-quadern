name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v1
      
      - name: Install and Build
        env:
          VITE_SUPABASE_URL: "https://ilufkshwfxggslskftzr.supabase.co"
          VITE_SUPABASE_ANON_KEY: "sb_publishable_86PL3iy2xO5odeKsP7RMPA_txzMlsIS"
        run: |
          bun install
          bun run build

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_SHIRKA_QUADERN }}
          channelId: live
          projectId: shirka-quadern

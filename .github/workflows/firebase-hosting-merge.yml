name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v1
      
      - name: Install dependencies
        run: bun install

      - name: Create .env file and Build
        run: |
          echo "VITE_SUPABASE_URL=https://ilufkshwfxgqslskftzr.supabase.co" > .env
          echo "VITE_SUPABASE_ANON_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlsdWZrc2h3ZnhncXNsc2tmdHpyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE5NTE1MzAsImV4cCI6MjA4NzUyNzUzMH0._06a4trceVX66_gQ-pkoiPmlEiK26HYDjXoZweviw5c" >> .env
          echo "VITE_SUPABASE_PUBLISHABLE_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlsdWZrc2h3ZnhncXNsc2tmdHpyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE5NTE1MzAsImV4cCI6MjA4NzUyNzUzMH0._06a4trceVX66_gQ-pkoiPmlEiK26HYDjXoZweviw5c" >> .env
          bun run build

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_SHIRKA_QUADERN }}
          channelId: live
          projectId: shirka-quadern
